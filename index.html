<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<title>Carte — Festival Asiasie 2026</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:'Figtree',-apple-system,sans-serif;background:#f8f6f1;color:#1a1208;-webkit-text-size-adjust:100%}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh}

/* TICKER */
.ticker{background:#f06118;color:#fff;font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:8px 0;white-space:nowrap;overflow:hidden;flex-shrink:0}
.ticker-inner{display:inline-block;animation:tick 26s linear infinite}
.ticker-inner span{margin:0 22px}
@keyframes tick{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

/* HEADER */
.hdr{padding:11px 16px;display:flex;align-items:center;gap:10px;border-bottom:1.5px solid #1a1208;background:#fff;flex-shrink:0}
.logo{height:26px;width:auto;flex-shrink:0}
.logo path,.logo rect,.logo polygon{fill:#1a1208}
.hdr-title{font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:#6b5a34;flex:1}
.vtoggle{display:flex;border:1.5px solid #1a1208;border-radius:8px;overflow:hidden;flex-shrink:0}
.vbtn{padding:7px 12px;background:transparent;border:none;font-size:11px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:#6b5a34;cursor:pointer;font-family:inherit;-webkit-tap-highlight-color:transparent;transition:all .12s;touch-action:manipulation}
.vbtn+.vbtn{border-left:1px solid #1a1208}
.vbtn.on{background:#1a1208;color:#fff}

/* FILTERS */
.filters{display:flex;gap:6px;padding:9px 14px;overflow-x:auto;border-bottom:1px solid rgba(26,18,8,.1);background:#fff;flex-shrink:0;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.fbtn{display:flex;align-items:center;gap:5px;padding:6px 11px;border-radius:20px;border:1.5px solid rgba(26,18,8,.15);background:transparent;color:#6b5a34;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;cursor:pointer;white-space:nowrap;font-family:inherit;-webkit-tap-highlight-color:transparent;touch-action:manipulation;transition:all .15s;flex-shrink:0}
.fdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.fbtn.fa{background:#1a1208;border-color:#1a1208;color:#fff}
.fbtn.fb{background:#f5d9c0;border-color:#e8a87a;color:#7a3d10;font-weight:800}
.fbtn.far{background:#d6e8d0;border-color:#a8cc9e;color:#2d5e25;font-weight:800}
.fbtn.fm{background:#f5cdd4;border-color:#e8939f;color:#7a2535;font-weight:800}
.fbtn.fbi{background:#c8d8ed;border-color:#8aacd4;color:#1e3d6b;font-weight:800}
.fbtn.fac{background:#e8e0f0;border-color:#b89cd4;color:#4a2080;font-weight:800}

/* CONTENT */
.content{flex:1;position:relative;overflow:hidden;min-height:0}

/* MAP PANEL */
#mapPanel{position:absolute;inset:0;display:flex;flex-direction:column}
.map-scroll{flex:1;overflow:auto;-webkit-overflow-scrolling:touch;position:relative;min-height:0;background:#f0ede5;cursor:grab}
.map-scroll:active{cursor:grabbing}
.map-scroll.panning{cursor:grabbing}

/* THE SVG MAP */
#themap{display:block;touch-action:none;user-select:none;-webkit-user-select:none}

/* Kiosque pins — use SVG group + circle + text so they scale naturally */
.kpin{cursor:pointer;-webkit-tap-highlight-color:transparent}
.kpin circle{transition:r .15s,stroke-width .15s}
.kpin:hover circle,.kpin.hi circle{r:18;stroke-width:2.5}
.kpin.dim{opacity:.15;pointer-events:none}
.kpin text{pointer-events:none;font-family:'Figtree',sans-serif;font-weight:900;text-anchor:middle;dominant-baseline:central}

/* Zoom controls */
.zoom-ctrls{position:absolute;bottom:52px;right:12px;display:flex;flex-direction:column;gap:6px}
.zcbtn{width:36px;height:36px;border-radius:50%;background:#fff;border:1.5px solid #1a1208;font-size:18px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;touch-action:manipulation;line-height:1;color:#1a1208;box-shadow:0 2px 8px rgba(0,0,0,.12)}

/* Map legend */
.map-leg{display:flex;gap:10px;padding:8px 14px;background:#fff;border-top:1px solid rgba(26,18,8,.1);overflow-x:auto;scrollbar-width:none;flex-shrink:0;align-items:center}
.map-leg::-webkit-scrollbar{display:none}
.legitem{display:flex;align-items:center;gap:5px;white-space:nowrap;font-size:10px;font-weight:700;color:#6b5a34;letter-spacing:.04em;text-transform:uppercase;flex-shrink:0}
.legdot{width:10px;height:10px;border-radius:50%}

/* LIST PANEL */
#listPanel{position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none;padding:10px 14px 100px;background:#f8f6f1}
.grptitle{font-size:10px;font-weight:900;letter-spacing:.12em;text-transform:uppercase;padding:14px 0 8px;border-bottom:1.5px solid #1a1208;margin-bottom:8px}
.vcard{display:flex;align-items:center;gap:12px;padding:13px 14px;border:1.5px solid #1a1208;border-radius:10px;background:#fff;margin-bottom:7px;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation;transition:background .1s}
.vcard:active{background:#ede8da}
.vcard.dim{opacity:.18;pointer-events:none}
.vnum{font-size:16px;font-weight:900;color:#f06118;min-width:28px;line-height:1}
.vinfo{flex:1;min-width:0}
.vname{font-size:14px;font-weight:800;text-transform:uppercase;letter-spacing:.02em;line-height:1.25}
.vsub{font-size:11px;color:#6b5a34;margin-top:2px;font-weight:500}
.vbadge{font-size:9px;font-weight:900;letter-spacing:.06em;text-transform:uppercase;padding:4px 9px;border-radius:8px;border:1.5px solid;white-space:nowrap;flex-shrink:0}
.varr{font-size:18px;color:#6b5a34;flex-shrink:0}

/* DRAWER */
.overlay{position:fixed;inset:0;background:rgba(26,18,8,.55);z-index:200;opacity:0;pointer-events:none;transition:opacity .25s}
.overlay.on{opacity:1;pointer-events:all}
.drawer{position:fixed;bottom:0;left:0;right:0;background:#fff;border-radius:16px 16px 0 0;border-top:1.5px solid #1a1208;z-index:201;max-height:82vh;overflow-y:auto;overscroll-behavior:contain;transform:translateY(110%);transition:transform .3s cubic-bezier(.32,.72,0,1);padding-bottom:env(safe-area-inset-bottom,16px);-webkit-overflow-scrolling:touch}
.drawer.on{transform:translateY(0)}
.dpull{display:flex;justify-content:center;padding:12px 0 6px;cursor:pointer;position:sticky;top:0;background:#fff;z-index:1;border-bottom:.5px solid rgba(26,18,8,.1)}
.dpill{width:36px;height:4px;border-radius:2px;background:rgba(26,18,8,.18)}
.dhead{padding:16px 18px 12px;border-bottom:1px solid rgba(26,18,8,.1)}
.dbadge{display:inline-block;font-size:9px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;padding:3px 10px;border-radius:10px;border:1.5px solid;margin-bottom:10px}
.dtop{display:flex;align-items:baseline;gap:10px;margin-bottom:6px}
.dnum{font-size:30px;font-weight:900;color:#f06118;line-height:1}
.dname{font-size:clamp(17px,5vw,23px);font-weight:900;text-transform:uppercase;letter-spacing:.02em;line-height:1.15}
.dlieu{font-size:12px;color:#6b5a34;font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.dbody{padding:16px 18px 8px}
.ddesc{font-size:15px;line-height:1.7;color:#1a1208}
.dtags{display:flex;gap:6px;flex-wrap:wrap;margin-top:14px}
.dtag{font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:4px 11px;border-radius:12px;border:1.5px solid rgba(26,18,8,.12);color:#6b5a34}
.dlocate{display:flex;align-items:center;gap:8px;margin:14px 0 0;padding:13px 14px;border:1.5px solid #1a1208;border-radius:10px;background:#f8f6f1;font-size:12px;font-weight:700;color:#1a1208;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.dclose{display:block;width:100%;margin:12px 0 0;padding:17px;background:#1a1208;color:#fff;font-size:13px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;border:none;border-radius:10px;cursor:pointer;font-family:inherit;touch-action:manipulation}

@media(min-width:600px){
  .drawer{max-width:520px;left:50%;right:auto;transform:translateX(-50%) translateY(110%)}
  .drawer.on{transform:translateX(-50%) translateY(0)}
  #listPanel{padding:12px 24px 100px}
}
</style>
</head>

<div class="ticker">

// ── STATE ──
let filter = 'all';
let curView = 'map';
let scale = 1;
let highlighted = null;

// ── LAYOUT ──
// SVG total size depends on mobile vs desktop
const MOBILE_W = 460;  // single column width
const DESK_W   = 980;  // TOM(460) + gap(60) + CE(460)
const TOM_SIZE = 480;  // square bounding box
const CE_W     = 420, CE_H = 380;
const GAP      = 50;   // gap between buildings

function isMob(){ return window.innerWidth < 640; }

// Build absolute SVG positions for each vendor
function vendorPos(v){
  const mob = isMob();
  if(v.tx !== undefined){
    // Time Out Market
    const ox = mob ? 10 : 10;
    const oy = mob ? 10 : (TOM_SIZE/2 - 200);
    return { x: ox + v.tx, y: oy + v.ty };
  } else {
    // Centre Eaton
    const ox = mob ? 10 : (TOM_SIZE + GAP + 10);
    const oy = mob ? (TOM_SIZE + 80 + 10) : 60;
    return { x: ox + v.ex, y: oy + v.ey };
  }
}

function svgTotalSize(){
  const mob = isMob();
  if(mob){
    return { w: MOBILE_W, h: TOM_SIZE + 80 + CE_H + 60 };
  } else {
    return { w: DESK_W, h: Math.max(TOM_SIZE, CE_H) + 80 };
  }
}

// ── BUILD SVG MAP ──
const NS = 'http://www.w3.org/2000/svg';
function el(tag, attrs){
  const e = document.createElementNS(NS, tag);
  for(const [k,v] of Object.entries(attrs)) e.setAttribute(k,v);
  return e;
}
function txt(content, x, y, attrs={}){
  const t = el('text', {x, y, ...attrs});
  t.textContent = content;
  return t;
}
function rr(x,y,w,h,r,fill,stroke,sw=2){
  const p = el('rect', {x,y,width:w,height:h,rx:r});
  if(fill) p.setAttribute('fill', fill);
  if(stroke){ p.setAttribute('stroke', stroke); p.setAttribute('stroke-width', sw); }
  return p;
}

function buildMap(){
  const mob = isMob();
  const {w,h} = svgTotalSize();
  const svg = document.getElementById('themap');
  svg.setAttribute('width', w * scale);
  svg.setAttribute('height', h * scale);
  svg.setAttribute('viewBox', `0 0 ${w} ${h}`);

  // Background + grid
  const bg = document.getElementById('mapBg');
  bg.innerHTML = '';
  const bgRect = rr(0,0,w,h,0,'#f0ede5',null);
  const gridRect = rr(0,0,w,h,0,'url(#grid)',null);
  bg.append(bgRect, gridRect);

  // Floor plan
  const fl = document.getElementById('mapFloor');
  fl.innerHTML = '';

  if(mob){
    buildTOM(fl, 10, 10);
    // separator
    const sep = el('g',{});
    sep.append(rr(10, TOM_SIZE+10+20, MOBILE_W-20, 40, 6, '#ede8da', 'rgba(26,18,8,0.08)', 1));
    const st = txt('── RUE SAINTE-CATHERINE OUEST ──', MOBILE_W/2, TOM_SIZE+10+20+25, {'text-anchor':'middle','font-size':'9','font-weight':'700','fill':'#6b5a34','font-family':'Figtree,sans-serif','letter-spacing':'1'});
    sep.append(st);
    fl.append(sep);
    buildCE(fl, 10, TOM_SIZE + 10 + 80);
  } else {
    const tomY = (Math.max(TOM_SIZE, CE_H+60) - TOM_SIZE) / 2 + 30;
    const ceY  = (Math.max(TOM_SIZE, CE_H+60) - CE_H) / 2 + 30;
    buildTOM(fl, 10, tomY);
    // vertical separator
    const sepX = TOM_SIZE + 10 + GAP/2;
    const sepLine = el('line', {x1:sepX, y1:20, x2:sepX, y2:h-20, stroke:'rgba(26,18,8,0.15)', 'stroke-width':'1', 'stroke-dasharray':'6,4'});
    const sepTxt = el('text', {x:sepX, y:h/2, 'text-anchor':'middle', transform:`rotate(-90,${sepX},${h/2})`, 'font-size':'8', 'font-weight':'700', fill:'rgba(26,18,8,0.3)', 'font-family':'Figtree,sans-serif'});
    sepTxt.textContent = 'RUE SAINTE-CATHERINE OUEST';
    fl.append(sepLine, sepTxt);
    buildCE(fl, TOM_SIZE + 10 + GAP, ceY);
  }

  buildPins();
}

function buildTOM(parent, ox, oy){
  // TOM cross/diamond shape inspired by real plan
  // Outer walls — octagonal shape approximating the cross
  const S = TOM_SIZE - 20;

  // Main outer shape — octagon (cut corners)
  const cut = 60;
  const pts = [
    [ox+cut, oy], [ox+S-cut, oy],
    [ox+S, oy+cut], [ox+S, oy+S-cut],
    [ox+S-cut, oy+S], [ox+cut, oy+S],
    [ox, oy+S-cut], [ox, oy+cut]
  ].map(p=>p.join(',')).join(' ');

  const outer = el('polygon', {points:pts, fill:'#fff', stroke:'#1a1208', 'stroke-width':'2'});
  parent.append(outer);

  // Wood floor (central area)
  const wf = el('polygon', {points:pts, fill:'url(#woodTOM)'});
  parent.append(wf);

  // Central open courtyard (ellipse, like real TOM)
  const cx = ox + S/2, cy = oy + S/2 + 10;
  const court = el('ellipse', {cx, cy, rx:55, ry:40, fill:'#e8e2d4', stroke:'rgba(26,18,8,0.12)', 'stroke-width':'1'});
  const courtTxt = txt('SCÈNE', cx, cy-4, {'text-anchor':'middle','font-size':'9','font-weight':'900','fill':'#f06118','font-family':'Figtree,sans-serif'});
  const courtTxt2 = txt('PRINCIPALE', cx, cy+8, {'text-anchor':'middle','font-size':'7','fill':'rgba(240,97,24,0.7)','font-family':'Figtree,sans-serif'});
  parent.append(court, courtTxt, courtTxt2);

  // Inner allées (cross pattern)
  const m = ox + S/2, my = oy + S/2;
  // horizontal allée
  const ha = rr(ox+20, my-12, S-40, 24, 2, 'rgba(26,18,8,0.04)', null);
  // vertical allée
  const va = rr(m-12, oy+20, 24, S-40, 2, 'rgba(26,18,8,0.04)', null);
  parent.append(ha, va);

  // Stand zones — small rectangles around perimeter
  const zones = [
    // top row
    {x:ox+80, y:oy+10, w:70, h:38, label:'Zone A'},
    {x:ox+170,y:oy+10, w:70, h:38, label:'Zone B'},
    {x:ox+260,y:oy+10, w:70, h:38, label:'Zone C'},
    // bottom row
    {x:ox+80, y:oy+S-48,w:70, h:38, label:'Zone D'},
    {x:ox+170,y:oy+S-48,w:70, h:38, label:'Zone E'},
    {x:ox+260,y:oy+S-48,w:70, h:38, label:'Zone F'},
    // left col
    {x:ox+10, y:oy+90, w:38, h:60, label:''},
    {x:ox+10, y:oy+190,w:38, h:60, label:''},
    {x:ox+10, y:oy+290,w:38, h:60, label:''},
    // right col
    {x:ox+S-48,y:oy+90, w:38, h:60, label:''},
    {x:ox+S-48,y:oy+190,w:38, h:60, label:''},
    {x:ox+S-48,y:oy+290,w:38, h:60, label:''},
  ];
  zones.forEach(z=>{
    const r = rr(z.x, z.y, z.w, z.h, 3, '#f5f0e8', 'rgba(26,18,8,0.12)', 1);
    parent.append(r);
    if(z.label){
      const t = txt(z.label, z.x+z.w/2, z.y+z.h/2+3, {'text-anchor':'middle','font-size':'7','fill':'rgba(26,18,8,0.3)','font-family':'Figtree,sans-serif'});
      parent.append(t);
    }
  });

  // Bar central
  const bar = rr(ox+S/2-45, oy+S/2-18, 90, 36, 4, '#ede8da', 'rgba(26,18,8,0.15)', 1);
  const barT = txt('BAR', ox+S/2, oy+S/2+4, {'text-anchor':'middle','font-size':'8','font-weight':'700','fill':'#6b5a34','font-family':'Figtree,sans-serif'});
  parent.append(bar, barT);

  // Atelier zone (top-right corner)
  const at = rr(ox+S-50, oy+5, 50, 50, 4, 'rgba(140,110,42,0.12)', '#8c6e2a', 1.5);

  parent.append(at, atT);

  // Entrances (4 sides of octagon)
  const entrees = [
    {x:ox+S/2-25, y:oy+S-3, w:50, h:8, label:'SUD'},
    {x:ox+S/2-25, y:oy-5,   w:50, h:8, label:'NORD'},
    {x:ox-5,      y:oy+S/2-15, w:8, h:30, label:''},

  entrees.forEach(e=>{

  parent.append(comp, compT);
}

function buildCE(parent, ox, oy){

  const W = CE_W - 20, H = CE_H - 20;

  const outer = rr(ox, oy, W, H, 8, '#fff', '#1a1208', 2);
  parent.append(outer);
  const fill = rr(ox, oy, W, H, 8, 'url(#woodCE)', null);
  parent.append(fill);

  // Central atrium
  const atrX = ox + W/2 - 50, atrY = oy + H/2 - 35;
  const atr = rr(atrX, atrY, 100, 70, 6, '#dce8f0', 'rgba(159,179,212,0.5)', 1.5);
  const atrT = txt('SCÈNE', ox+W/2, atrY+30, {'text-anchor':'middle','font-size':'9','font-weight':'900','fill':'#4a6090','font-family':'Figtree,sans-serif'});
  const atrT2 = txt('EATON', ox+W/2, atrY+43, {'text-anchor':'middle','font-size':'7','fill':'rgba(74,96,144,0.7)','font-family':'Figtree,sans-serif'});
  parent.append(atr, atrT, atrT2);

  // Allées
  const alleeH = rr(ox+10, oy+H/2-8, W-20, 16, 2, 'rgba(26,18,8,0.04)', null);
  const alleeV = rr(ox+W/2-8, oy+10, 16, H-20, 2, 'rgba(26,18,8,0.04)', null);
  parent.append(alleeH, alleeV);

  // Stand zones
  [[ox+15,oy+15,75,55],[ox+W-90,oy+15,75,55],
   [ox+15,oy+H-70,75,55],[ox+W-90,oy+H-70,75,55],
   [ox+W/2-45,oy+15,90,38],[ox+W/2-45,oy+H-53,90,38]
  ].forEach(([x,y,w,h])=>{
    parent.append(rr(x,y,w,h,3,'#f0f4f8','rgba(159,179,212,0.4)',1));

  // Entrance
  const entCE = rr(ox+W/2-30, oy+H-3, 60, 8, 2, '#9fb3d4', null);

  parent.append(txt('Sainte-Catherine Ouest', ox+W/2, oy-1, {'text-anchor':'middle','font-size':'8','fill':'#6b5a34','font-family':'Figtree,sans-serif'}));

function buildPins(){
  const pinGroup = document.getElementById('mapPins');
  pinGroup.innerHTML = '';

  V.forEach(v=>{
    const c = CATS[v.cat];
    const pos = vendorPos(v);
    const active = filter==='all' || filter===v.cat;
    const hi = highlighted===v.id;

    const g = el('g', {'class':`kpin${!active?' dim':''}${hi?' hi':''}`, 'data-id':v.id});

    // Outer glow for highlighted
    if(hi){
      const glow = el('circle',{cx:pos.x,cy:pos.y,r:'24',fill:c.bg,opacity:'0.4'});
      g.append(glow);
    }

    const circle = el('circle',{cx:pos.x, cy:pos.y, r:hi?'19':'16', fill:c.bg, stroke:c.text, 'stroke-width':hi?'2.5':'2'});
    const label = el('text',{x:pos.x, y:pos.y, 'font-size':hi?'11':'10', fill:c.text, 'font-family':'Figtree,sans-serif', 'font-weight':'900', 'text-anchor':'middle', 'dominant-baseline':'central'});
    label.textContent = v.id;

    g.append(circle, label);

    g.addEventListener('click', (e)=>{ e.stopPropagation(); openDrawer(v.id); });
    g.addEventListener('touchend', (e)=>{ e.preventDefault(); e.stopPropagation(); openDrawer(v.id); }, {passive:false});

    pinGroup.append(g);
  });
}

// ── ZOOM ──
function zoom(factor){
  scale = Math.min(4, Math.max(0.5, scale * factor));
  applyZoom();
}
function resetZoom(){
  scale = 1;
  applyZoom();
  const sc = document.getElementById('mapScroll');
  sc.scrollTo({top:0, left:0, behavior:'smooth'});
}
function applyZoom(){
  const {w,h} = svgTotalSize();
  const svg = document.getElementById('themap');
  svg.setAttribute('width', w * scale);
  svg.setAttribute('height', h * scale);
}

// ── PINCH TO ZOOM ──
let pinchDist0 = null, scale0 = 1;
const sc = document.getElementById('mapScroll');
sc.addEventListener('touchstart', e=>{
  if(e.touches.length===2){
    pinchDist0 = Math.hypot(e.touches[1].clientX-e.touches[0].clientX, e.touches[1].clientY-e.touches[0].clientY);
    scale0 = scale;
  }
},{passive:true});
sc.addEventListener('touchmove', e=>{
  if(e.touches.length===2 && pinchDist0){
    e.preventDefault();
    const d = Math.hypot(e.touches[1].clientX-e.touches[0].clientX, e.touches[1].clientY-e.touches[0].clientY);
    scale = Math.min(4, Math.max(0.5, scale0 * d/pinchDist0));
    applyZoom();
  }
},{passive:false});
sc.addEventListener('touchend', e=>{ if(e.touches.length<2) pinchDist0=null; },{passive:true});

// ── FILTER ──
function setFilter(cat){
  filter = cat;
  // update buttons
  document.querySelectorAll('.fbtn').forEach(b=>{
    const bc = b.dataset.cat || 'all';
    b.className = 'fbtn';
    if(bc===cat){
      if(cat==='all') b.className='fbtn fa';
      else b.className='fbtn f'+cat.substring(0,1)+(cat==='bouffe'?'b':cat==='art'?'ar':cat==='mode'?'m':cat==='bien'?'bi':'ac');
    }
  });
  buildPins();
  renderList();
}

// ── VIEW ──
function showView(v){
  curView=v;
  document.getElementById('mapPanel').style.display = v==='map'?'flex':'none';
  document.getElementById('listPanel').style.display = v==='list'?'block':'none';
  document.getElementById('btnMap').classList.toggle('on', v==='map');
  document.getElementById('btnList').classList.toggle('on', v==='list');
}

// ── LIST ──
function renderList(){
  const panel = document.getElementById('listPanel');
  const cats = filter==='all' ? Object.keys(CATS) : [filter];
  let html='';
  cats.forEach(cat=>{
    const items = V.filter(v=>v.cat===cat);
    if(!items.length) return;
    const c = CATS[cat];
    html+=`<div class="grptitle" style="color:${c.text}">${c.label} (${items.length})</div>`;
    items.forEach(v=>{
      html+=`<div class="vcard" onclick="openDrawer(${v.id})">
        <div class="vnum">${v.id}</div>
        <div class="vinfo"><div class="vname">${v.name}</div><div class="vsub">📍 ${v.lieu}</div></div>
        <span class="vbadge" style="background:${c.bg};color:${c.text};border-color:${c.bd}">${c.label}</span>
        <div class="varr">›</div>
      </div>`;
    });
  });
  panel.innerHTML=html;
}

// ── DRAWER ──
let dtouchY=0;
function openDrawer(id){
  const v=V.find(x=>x.id===id); if(!v) return;
  const c=CATS[v.cat];
  document.getElementById('dhead').innerHTML=`
    <div class="dbadge" style="background:${c.bg};color:${c.text};border-color:${c.bd}">${c.label}</div>
    <div class="dtop"><span class="dnum">${v.id}</span><span class="dname">${v.name}</span></div>
    <div class="dlieu">📍 ${v.lieu}</div>`;
  const tags=(v.tags||[]).map(t=>`<span class="dtag">${t}</span>`).join('');
  document.getElementById('dbody').innerHTML=`
    <p class="ddesc">${v.desc}</p>
    ${tags?`<div class="dtags">${tags}</div>`:''}
    <div class="dlocate" onclick="locatePin(${v.id})">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="10" r="3"/><path d="M12 2a8 8 0 0 1 8 8c0 5.25-8 13-8 13S4 15.25 4 10a8 8 0 0 1 8-8z"/></svg>
      Voir sur la carte
    </div>
    <button class="dclose" onclick="closeDrawer()">Fermer</button>`;
  document.getElementById('drawer').scrollTop=0;
  requestAnimationFrame(()=>{
    document.getElementById('overlay').classList.add('on');
    document.getElementById('drawer').classList.add('on');
    document.body.style.overflow='hidden';
  });
}
function closeDrawer(){
  document.getElementById('overlay').classList.remove('on');
  document.getElementById('drawer').classList.remove('on');
  document.body.style.overflow='';
}
function locatePin(id){
  closeDrawer();
  showView('map');
  highlighted=id;
  buildPins();
  // Scroll to pin
  setTimeout(()=>{
    const pos = vendorPos(V.find(v=>v.id===id));
    const sc2 = document.getElementById('mapScroll');
    const {w,h}=svgTotalSize();
    sc2.scrollTo({
      left: Math.max(0, pos.x*scale - sc2.clientWidth/2),
      top:  Math.max(0, pos.y*scale - sc2.clientHeight/2),
      behavior:'smooth'
    });
    setTimeout(()=>{ highlighted=null; buildPins(); }, 2500);
  },350);
}

// Swipe to close
document.getElementById('drawer').addEventListener('touchstart',e=>{dtouchY=e.touches[0].clientY;},{passive:true});
document.getElementById('drawer').addEventListener('touchmove',e=>{
  if(e.touches[0].clientY-dtouchY>70 && document.getElementById('drawer').scrollTop<=0) closeDrawer();
},{passive:true});
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeDrawer(); });

// ── INIT & RESIZE ──
function init(){
  buildMap();
  renderList();
  // setFilter resets button classes properly
  document.querySelectorAll('.fbtn').forEach(b=>{
    if(!b.dataset.cat) b.dataset.cat='all';
  });
}

window.addEventListener('resize', ()=>{ buildMap(); renderList(); });
window.addEventListener('orientationchange', ()=>setTimeout(()=>{ buildMap(); renderList(); }, 200));
init();
</script>
</body>
