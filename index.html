<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<title>Carte — Festival Asiasie 2026</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:'Figtree',-apple-system,sans-serif;background:#f8f6f1;color:#1a1208;-webkit-text-size-adjust:100%}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh}

/* TICKER */
.ticker{background:#f06118;color:#fff;font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:8px 0;white-space:nowrap;overflow:hidden;flex-shrink:0}
.ticker-inner{display:inline-block;animation:tick 26s linear infinite}
.ticker-inner span{margin:0 22px}
@keyframes tick{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

/* HEADER */
.hdr{padding:11px 16px;display:flex;align-items:center;gap:10px;border-bottom:1.5px solid #1a1208;background:#fff;flex-shrink:0}
.logo{height:26px;width:auto;flex-shrink:0}
.logo path,.logo rect,.logo polygon{fill:#1a1208}
.hdr-title{font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:#6b5a34;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.vtoggle{display:flex;border:1.5px solid #1a1208;border-radius:8px;overflow:hidden;flex-shrink:0}
.vbtn{padding:8px 14px;background:transparent;border:none;font-size:11px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:#6b5a34;cursor:pointer;font-family:inherit;-webkit-tap-highlight-color:transparent;transition:all .12s;touch-action:manipulation}
.vbtn+.vbtn{border-left:1px solid #1a1208}
.vbtn.on{background:#1a1208;color:#fff}

/* VENUE LABEL */
.venue-label{padding:8px 14px;background:#f8f6f1;border-bottom:1px solid rgba(26,18,8,.1);font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:#f06118;display:flex;align-items:center;gap:6px;flex-shrink:0}
.venue-dot{width:7px;height:7px;border-radius:50%;background:#f06118;flex-shrink:0}

/* FILTERS */
.filters{display:flex;gap:6px;padding:9px 14px;overflow-x:auto;border-bottom:1px solid rgba(26,18,8,.08);background:#fff;flex-shrink:0;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.fbtn{display:flex;align-items:center;gap:4px;padding:7px 11px;border-radius:20px;border:1.5px solid rgba(26,18,8,.15);background:transparent;color:#6b5a34;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;cursor:pointer;white-space:nowrap;font-family:inherit;-webkit-tap-highlight-color:transparent;touch-action:manipulation;transition:all .15s;flex-shrink:0}
.fdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.fbtn.act-all   {background:#1a1208;border-color:#1a1208;color:#fff}
.fbtn.act-bouffe{background:#f5d9c0;border-color:#e8a87a;color:#7a3d10;font-weight:800}
.fbtn.act-art   {background:#d6e8d0;border-color:#a8cc9e;color:#2d5e25;font-weight:800}
.fbtn.act-mode  {background:#f5cdd4;border-color:#e8939f;color:#7a2535;font-weight:800}
.fbtn.act-bien  {background:#c8d8ed;border-color:#8aacd4;color:#1e3d6b;font-weight:800}
.fbtn.act-activ {background:#e8e0f0;border-color:#b89cd4;color:#4a2080;font-weight:800}

/* CONTENT */
.content{flex:1;position:relative;overflow:hidden;min-height:0}

/* ── MAP VIEW — SVG transform matrix ── */
#mapView{position:absolute;inset:0;display:flex;flex-direction:column}

/* The viewport SVG fills 100% */
#viewport{
  flex:1;
  width:100%;
  display:block;
  cursor:grab;
  touch-action:none; /* we handle all touch ourselves */
  -webkit-tap-highlight-color:transparent;
  user-select:none;
  -webkit-user-select:none;
  background:#f8f6f1;
}
#viewport.panning{cursor:grabbing}

/* Map legend bar */
.map-leg{display:flex;gap:10px;padding:7px 14px;background:#fff;border-top:1px solid rgba(26,18,8,.1);overflow-x:auto;scrollbar-width:none;flex-shrink:0;align-items:center}
.map-leg::-webkit-scrollbar{display:none}
.legitem{display:flex;align-items:center;gap:5px;white-space:nowrap;font-size:10px;font-weight:700;color:#6b5a34;letter-spacing:.04em;text-transform:uppercase;flex-shrink:0}
.legdot{width:9px;height:9px;border-radius:50%}

/* Zoom controls */
.zctrls{position:absolute;bottom:60px;right:14px;display:flex;flex-direction:column;gap:10px;z-index:20}
.zcbtn{width:46px;height:46px;border-radius:50%;background:#fff;border:1.5px solid rgba(26,18,8,.25);font-size:22px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;touch-action:manipulation;color:#1a1208;box-shadow:0 2px 14px rgba(0,0,0,.15);line-height:1;font-family:inherit}
.zcbtn:active{background:#f8f6f1;transform:scale(.93)}

/* ── LIST VIEW ── */
#listView{position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none;padding:12px 16px 100px;background:#f8f6f1}
.grptitle{font-size:11px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;padding:14px 0 10px;border-bottom:1.5px solid #1a1208;margin-bottom:10px}
.vcard{display:flex;align-items:center;gap:12px;padding:16px 16px;border:1.5px solid #1a1208;border-radius:12px;background:#fff;margin-bottom:8px;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation;transition:background .1s}
.vcard:active{background:#ede8da}
.vcard.dim{opacity:.18;pointer-events:none}
.vnum{font-size:18px;font-weight:900;color:#f06118;min-width:30px;line-height:1;flex-shrink:0}
.vinfo{flex:1;min-width:0}
.vname{font-size:15px;font-weight:800;text-transform:uppercase;letter-spacing:.02em;line-height:1.25}
.vsub{font-size:12px;color:#6b5a34;margin-top:3px;font-weight:500}
.vbadge{font-size:9px;font-weight:900;letter-spacing:.06em;text-transform:uppercase;padding:5px 10px;border-radius:8px;border:1.5px solid;white-space:nowrap;flex-shrink:0}
.varr{font-size:20px;color:#6b5a34;flex-shrink:0}
.vlocate{display:flex;align-items:center;gap:5px;padding:8px 12px;border-radius:10px;border:1.5px solid #1a1208;background:transparent;color:#1a1208;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;cursor:pointer;font-family:inherit;-webkit-tap-highlight-color:transparent;touch-action:manipulation;white-space:nowrap;flex-shrink:0;transition:all .15s}
.vlocate:active{background:#1a1208;color:#fff}
.empty{padding:48px 20px;text-align:center;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#6b5a34;opacity:.6}

/* DRAWER */
.overlay{position:fixed;inset:0;background:rgba(26,18,8,.55);z-index:200;opacity:0;pointer-events:none;transition:opacity .25s}
.overlay.on{opacity:1;pointer-events:all}
.drawer{position:fixed;bottom:0;left:0;right:0;background:#fff;border-radius:16px 16px 0 0;border-top:1.5px solid #1a1208;z-index:201;max-height:82vh;overflow-y:auto;overscroll-behavior:contain;transform:translateY(110%);transition:transform .3s cubic-bezier(.32,.72,0,1);padding-bottom:env(safe-area-inset-bottom,16px);-webkit-overflow-scrolling:touch}
.drawer.on{transform:translateY(0)}
.dpull{display:flex;justify-content:center;padding:12px 0 6px;cursor:pointer;position:sticky;top:0;background:#fff;z-index:1;border-bottom:.5px solid rgba(26,18,8,.1)}
.dpill{width:36px;height:4px;border-radius:2px;background:rgba(26,18,8,.18)}
.dhead{padding:16px 18px 12px;border-bottom:1px solid rgba(26,18,8,.1)}
.dbadge{display:inline-block;font-size:9px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;padding:3px 10px;border-radius:10px;border:1.5px solid;margin-bottom:10px}
.dtop{display:flex;align-items:baseline;gap:10px;margin-bottom:6px}
.dnum{font-size:30px;font-weight:900;color:#f06118;line-height:1}
.dname{font-size:clamp(17px,5vw,23px);font-weight:900;text-transform:uppercase;letter-spacing:.02em;line-height:1.15}
.dlieu{font-size:12px;color:#6b5a34;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-top:4px}
.dbody{padding:16px 18px 8px}
.ddesc{font-size:15px;line-height:1.7;color:#1a1208}
.dtags{display:flex;gap:6px;flex-wrap:wrap;margin-top:14px}
.dtag{font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:4px 11px;border-radius:12px;border:1.5px solid rgba(26,18,8,.12);color:#6b5a34}
.dclose{display:block;width:100%;margin:12px 0 0;padding:17px;background:#1a1208;color:#fff;font-size:13px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;border:none;border-radius:10px;cursor:pointer;font-family:inherit;touch-action:manipulation}

@media(min-width:600px){
  .drawer{max-width:520px;left:50%;right:auto;transform:translateX(-50%) translateY(110%)}
  .drawer.on{transform:translateX(-50%) translateY(0)}
  #listView{padding:12px 24px 100px}
}
</style>
</head>

// ══════════════════════════════════════════
// SVG MATRIX ENGINE — single source of truth
// tx, ty = translation | sc = scale
// All operations go through applyMatrix()
// ══════════════════════════════════════════
const MAP_W=560, MAP_H=820;
let tx=0, ty=0, sc=1;
const MIN_SC=0.3, MAX_SC=6;
const NS='http://www.w3.org/2000/svg';

function applyMatrix(){
  document.getElementById('world').setAttribute(
    'transform', `translate(${tx},${ty}) scale(${sc})`
  );
}

// Fit entire map in viewport with padding
function fitMap(anim){
  const vp=document.getElementById('viewport');
  const vw=vp.clientWidth||360, vh=vp.clientHeight||500;
  sc=Math.min((vw/MAP_W)*0.88, (vh/MAP_H)*0.88);
  sc=Math.max(MIN_SC, Math.min(sc, MAX_SC));
  tx=(vw - MAP_W*sc)/2;
  ty=(vh - MAP_H*sc)/2;
  applyMatrix();
}

// Zoom centered on a viewport point (cx, cy)
function zoomOn(cx, cy, factor){
  const newSc=Math.max(MIN_SC, Math.min(MAX_SC, sc*factor));
  tx = cx - (cx - tx) * (newSc/sc);
  ty = cy - (cy - ty) * (newSc/sc);
  sc = newSc;
  applyMatrix();
}

// Zoom buttons — centered on viewport center
function zoomAt(factor){
  const vp=document.getElementById('viewport');
  zoomOn(vp.clientWidth/2, vp.clientHeight/2, factor);
}

// Convert viewport coords → world coords
function vpToWorld(vx, vy){ return {x:(vx-tx)/sc, y:(vy-ty)/sc}; }

// ══════════════════════════════════════════
// INPUT — mouse + touch
// ══════════════════════════════════════════
(function setupInput(){
  const vp=document.getElementById('viewport');
  let drag=false, startTx, startTy, startX, startY, moved=false;
  // Pinch
  let pinch=null, pinchSc, pinchTx, pinchTy;

  // ── MOUSE ──
  vp.addEventListener('mousedown', e=>{
    if(e.button!==0) return;
    drag=true; moved=false;
    startX=e.clientX; startY=e.clientY;
    startTx=tx; startTy=ty;
    vp.classList.add('panning');
    e.preventDefault();
  });
  window.addEventListener('mousemove', e=>{
    if(!drag) return;
    const dx=e.clientX-startX, dy=e.clientY-startY;
    if(Math.abs(dx)+Math.abs(dy)>4) moved=true;
    tx=startTx+dx; ty=startTy+dy;
    applyMatrix();
  });
  window.addEventListener('mouseup', e=>{
    if(!drag) return;
    vp.classList.remove('panning');
    if(!moved){
      // Tap — hit test
      const rect=vp.getBoundingClientRect();
      const w=vpToWorld(e.clientX-rect.left, e.clientY-rect.top);
      const hit=V.find(v=>{const d=Math.sqrt((v.x-w.x)**2+(v.y-w.y)**2); return d<18;});
      if(hit) openDrawer(hit.id);
    }
    drag=false;
  });
  vp.addEventListener('wheel', e=>{
    e.preventDefault();
    const rect=vp.getBoundingClientRect();
    zoomOn(e.clientX-rect.left, e.clientY-rect.top, e.deltaY<0?1.12:0.9);
  },{passive:false});

  // ── TOUCH ──
  vp.addEventListener('touchstart', e=>{
    e.preventDefault();
    if(e.touches.length===1){
      pinch=null;
      drag=true; moved=false;
      startX=e.touches[0].clientX; startY=e.touches[0].clientY;
      startTx=tx; startTy=ty;
    } else if(e.touches.length===2){
      drag=false;
      const t0=e.touches[0], t1=e.touches[1];
      pinch={
        dist: Math.hypot(t1.clientX-t0.clientX, t1.clientY-t0.clientY),
        mx:  (t0.clientX+t1.clientX)/2,
        my:  (t0.clientY+t1.clientY)/2,
      };
      pinchSc=sc; pinchTx=tx; pinchTy=ty;
      moved=true;
    }
  },{passive:false});

  vp.addEventListener('touchmove', e=>{
    e.preventDefault();
    if(e.touches.length===1 && drag){
      const dx=e.touches[0].clientX-startX, dy=e.touches[0].clientY-startY;
      if(Math.abs(dx)+Math.abs(dy)>4) moved=true;
      tx=startTx+dx; ty=startTy+dy;
      applyMatrix();
    } else if(e.touches.length===2 && pinch){
      const t0=e.touches[0], t1=e.touches[1];
      const dist=Math.hypot(t1.clientX-t0.clientX, t1.clientY-t0.clientY);
      const factor=dist/pinch.dist;
      const newSc=Math.max(MIN_SC, Math.min(MAX_SC, pinchSc*factor));
      // Zoom centered on midpoint
      const rect=document.getElementById('viewport').getBoundingClientRect();
      const mx=pinch.mx-rect.left, my=pinch.my-rect.top;
      tx = mx - (mx - pinchTx) * (newSc/pinchSc);
      ty = my - (my - pinchTy) * (newSc/pinchSc);
      sc = newSc;
      applyMatrix();
    }
  },{passive:false});

  vp.addEventListener('touchend', e=>{
    if(e.touches.length===0){
      if(!moved && drag){
        // Single tap — hit test using last known position
        const t=e.changedTouches[0];
        const rect=vp.getBoundingClientRect();
        const w=vpToWorld(t.clientX-rect.left, t.clientY-rect.top);
        const hit=V.find(v=>{const d=Math.sqrt((v.x-w.x)**2+(v.y-w.y)**2); return d<20;});
        if(hit) openDrawer(hit.id);
      }
      drag=false; pinch=null;
    } else if(e.touches.length===1){
      // Went from 2 fingers to 1 — resume pan
      pinch=null;
      drag=true; moved=true;
      startX=e.touches[0].clientX; startY=e.touches[0].clientY;
      startTx=tx; startTy=ty;
    }
  },{passive:true});
})();

// ══════════════════════════════════════════
// SVG HELPERS
// ══════════════════════════════════════════
function el(tag, attrs){
  const e=document.createElementNS(NS,tag);
  for(const[k,v] of Object.entries(attrs)) e.setAttribute(k,v);
  return e;
}
function rr(x,y,w,h,r,fill,stroke,sw=1.5){
  const p=el('rect',{x,y,width:w,height:h,rx:r});
  if(fill) p.setAttribute('fill',fill);
  if(stroke){p.setAttribute('stroke',stroke);p.setAttribute('stroke-width',sw);}
  return p;
}
function svgTxt(content,x,y,attrs){
  const t=el('text',{x,y,...attrs});
  t.textContent=content; return t;
}

// ══════════════════════════════════════════
// PINS
// ══════════════════════════════════════════
let curFilter='all', highlighted=null;

function buildPins(){
  const pg=document.getElementById('mapPins');
  pg.innerHTML='';
  V.forEach(v=>{
    const c=CATS[v.cat];
    const active=curFilter==='all'||curFilter===v.cat;
    const hi=highlighted===v.id;
    const g=el('g',{'data-id':String(v.id),'style':'cursor:pointer'});
    g.style.opacity=active?'1':'0.12';
    g.style.pointerEvents=active?'all':'none';

    if(hi){
      const ring=el('circle',{cx:v.x,cy:v.y,r:'20',fill:'none',stroke:c.text,'stroke-width':'1.5',opacity:'0.4'});
      ring.style.animation='pulseRing 0.7s ease-in-out infinite alternate';
      g.append(ring);
    }
    const r=hi?'14':'11';
    const circle=el('circle',{cx:v.x,cy:v.y,r,fill:c.text,stroke:'#fff','stroke-width':'1.8'});
    if(hi) circle.style.animation='pulsePin 0.7s ease-in-out infinite alternate';
    const lbl=el('text',{x:v.x,y:v.y,'text-anchor':'middle','dominant-baseline':'central',
      'font-size':hi?'9':'8','font-weight':'900','fill':'#fff',
      'font-family':'Figtree,sans-serif','pointer-events':'none'});
    lbl.textContent=v.id;
    g.append(circle,lbl);
    pg.append(g);
  });
}

// ══════════════════════════════════════════
// FILTER
// ══════════════════════════════════════════
function setFilter(cat){
  curFilter=cat;
  document.querySelectorAll('.fbtn').forEach(b=>{
    const bc=b.dataset.cat||'all';
    b.className='fbtn';
    if(bc===cat) b.classList.add('act-'+cat);
  });
  buildPins();
  renderList();
}

// VIEW
// ══════════════════════════════════════════
function showView(v){
  document.getElementById('mapView').style.display  = v==='map'?'flex':'none';
  document.getElementById('listView').style.display = v==='list'?'block':'none';
  document.getElementById('btnMap').classList.toggle('on',  v==='map');
  document.getElementById('btnList').classList.toggle('on', v==='list');
  if(v==='map') requestAnimationFrame(()=>fitMap());
}

// ══════════════════════════════════════════
// LIST
// ══════════════════════════════════════════
function renderList(){
  const panel=document.getElementById('listView');
  const cats=curFilter==='all'?Object.keys(CATS):[curFilter];
  let html='';
  cats.forEach(cat=>{
    const items=V.filter(v=>v.cat===cat);
    if(!items.length) return;
    const c=CATS[cat];
    html+=`<div class="grptitle" style="color:${c.text}">${c.label} (${items.length})</div>`;
    items.forEach(v=>{
      html+=`<div class="vcard" onclick="openDrawer(${v.id})">
        <div class="vnum">${v.id}</div>
        <div class="vinfo">
          <div class="vname">${v.name}</div>
          <div class="vsub">📍 Time Out Market</div>
        </div>
        <button class="vlocate" onclick="event.stopPropagation();locatePin(${v.id})">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="10" r="3"/><path d="M12 2a8 8 0 0 1 8 8c0 5.25-8 13-8 13S4 15.25 4 10a8 8 0 0 1 8-8z"/></svg>
          Carte
        </button>
        <div class="varr">›</div>
      </div>`;
    });
  });
  if(!html) html=`<div class="empty">Aucun marchand pour cette sélection</div>`;
  panel.innerHTML=html;
}

// ══════════════════════════════════════════
// LOCATE PIN — always perfectly centered
// ══════════════════════════════════════════
function locatePin(id){
  closeDrawer();
  const v=V.find(x=>x.id===id); if(!v) return;
  showView('map');
  highlighted=id;
  buildPins();

  // After switching to map view, center on pin using matrix
  requestAnimationFrame(()=>{
    const vp=document.getElementById('viewport');
    const vw=vp.clientWidth||360, vh=vp.clientHeight||500;

    // Keep current scale or zoom to a comfortable level
    const targetSc=Math.max(sc, 1.2);
    // Pin should be at center of viewport
    const newTx=vw/2 - v.x*targetSc;
    const newTy=vh/2 - v.y*targetSc;

    // Animate smoothly
    animateTo(newTx, newTy, targetSc, 350);

    setTimeout(()=>{ highlighted=null; buildPins(); },3000);
  });
}

// Smooth animation to target transform
function animateTo(targetTx, targetTy, targetSc, duration){
  const startTx=tx, startTy=ty, startSc=sc;
  const start=performance.now();
  function frame(now){
    const p=Math.min(1,(now-start)/duration);
    const ease=1-Math.pow(1-p,3); // ease-out cubic
    tx=startTx+(targetTx-startTx)*ease;
    ty=startTy+(targetTy-startTy)*ease;
    sc=startSc+(targetSc-startSc)*ease;
    applyMatrix();
    if(p<1) requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}

// ══════════════════════════════════════════
// DRAWER
// ══════════════════════════════════════════
let dtouchY=0;
function openDrawer(id){
  const v=V.find(x=>x.id===id); if(!v) return;
  const c=CATS[v.cat];
  document.getElementById('dhead').innerHTML=`
    <div class="dbadge" style="background:${c.bg};color:${c.text};border-color:${c.bd}">${c.label}</div>
    <div class="dtop"><span class="dnum">${v.id}</span><span class="dname">${v.name}</span></div>
    <div class="dlieu">📍 Time Out Market</div>`;
  const tags=(v.tags||[]).map(t=>`<span class="dtag">${t}</span>`).join('');
  document.getElementById('dbody').innerHTML=`
    <p class="ddesc">${v.desc}</p>
    ${tags?`<div class="dtags">${tags}</div>`:''}
    <div style="display:flex;gap:10px;margin-top:16px">
      <button class="dclose" style="background:#f8f6f1;color:#1a1208;border:1.5px solid #1a1208;flex:1" onclick="locatePin(${v.id})">
        📍 Voir sur la carte
      </button>
    </div>
    <button class="dclose" onclick="closeDrawer()">Fermer</button>`;
  document.getElementById('drawer').scrollTop=0;
  requestAnimationFrame(()=>{
    document.getElementById('overlay').classList.add('on');
    document.getElementById('drawer').classList.add('on');
  });
}
function closeDrawer(){
  document.getElementById('overlay').classList.remove('on');
  document.getElementById('drawer').classList.remove('on');
}
document.getElementById('drawer').addEventListener('touchstart',e=>{dtouchY=e.touches[0].clientY;},{passive:true});
document.getElementById('drawer').addEventListener('touchmove',e=>{
  if(e.touches[0].clientY-dtouchY>70&&document.getElementById('drawer').scrollTop<=0) closeDrawer();
},{passive:true});
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeDrawer(); });

// ══════════════════════════════════════════
// PULSE ANIMATION (CSS injected)
// ══════════════════════════════════════════
const styleEl=document.createElement('style');
styleEl.textContent=`
  @keyframes pulsePin{0%{r:11}100%{r:15}}
  @keyframes pulseRing{0%{r:18;opacity:.45}100%{r:26;opacity:.08}}
`;
document.head.appendChild(styleEl);

// ══════════════════════════════════════════
// RESIZE
// ══════════════════════════════════════════
window.addEventListener('resize', ()=>fitMap());
window.addEventListener('orientationchange', ()=>setTimeout(fitMap, 200));

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
drawFloor();
buildPins();
renderList();
// Wait for layout then fit
requestAnimationFrame(()=>requestAnimationFrame(()=>fitMap()));
</script>
