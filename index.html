<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<title>Carte — Festival Asiasie 2026</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:'Figtree',-apple-system,sans-serif;background:#f8f6f1;color:#1a1208;-webkit-text-size-adjust:100%}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh}

/* TICKER */
.ticker{background:#f06118;color:#fff;font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:8px 0;white-space:nowrap;overflow:hidden;flex-shrink:0}
.ticker-inner{display:inline-block;animation:tick 26s linear infinite}
.ticker-inner span{margin:0 22px}
@keyframes tick{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

/* HEADER */
.hdr{padding:9px 14px;display:flex;align-items:center;gap:8px;border-bottom:1.5px solid #1a1208;background:#fff;flex-shrink:0}
.logo{height:24px;width:auto;flex-shrink:0}
.logo path,.logo rect,.logo polygon{fill:#1a1208}
.hdr-title{font-size:11px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:#6b5a34;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.vtoggle{display:flex;border:1.5px solid #1a1208;border-radius:8px;overflow:hidden;flex-shrink:0}
.vbtn{padding:6px 10px;background:transparent;border:none;font-size:10px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:#6b5a34;cursor:pointer;font-family:inherit;-webkit-tap-highlight-color:transparent;transition:all .12s;touch-action:manipulation;white-space:nowrap}
.vbtn+.vbtn{border-left:1px solid #1a1208}
.vbtn.on{background:#1a1208;color:#fff}

.venue-label{padding:8px 14px;background:#f8f6f1;border-bottom:1px solid rgba(26,18,8,0.1);font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:#f06118;display:flex;align-items:center;gap:6px;flex-shrink:0}
.venue-dot{width:7px;height:7px;border-radius:50%;background:#f06118;flex-shrink:0}

/* FILTERS */
.filters{display:flex;gap:5px;padding:8px 12px;overflow-x:auto;border-bottom:1px solid rgba(26,18,8,.08);background:#fff;flex-shrink:0;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.fbtn{display:flex;align-items:center;gap:4px;padding:6px 10px;border-radius:20px;border:1.5px solid rgba(26,18,8,.15);background:transparent;color:#6b5a34;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;cursor:pointer;white-space:nowrap;font-family:inherit;-webkit-tap-highlight-color:transparent;touch-action:manipulation;transition:all .15s;flex-shrink:0}
.fdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.fbtn.act-all   {background:#1a1208;border-color:#1a1208;color:#fff}
.fbtn.act-bouffe{background:#f5d9c0;border-color:#e8a87a;color:#7a3d10;font-weight:800}
.fbtn.act-art   {background:#d6e8d0;border-color:#a8cc9e;color:#2d5e25;font-weight:800}
.fbtn.act-mode  {background:#f5cdd4;border-color:#e8939f;color:#7a2535;font-weight:800}
.fbtn.act-bien  {background:#c8d8ed;border-color:#8aacd4;color:#1e3d6b;font-weight:800}
.fbtn.act-activ {background:#e8e0f0;border-color:#b89cd4;color:#4a2080;font-weight:800}

/* CONTENT */
.content{flex:1;position:relative;overflow:hidden;min-height:0;display:flex}

/* SPLIT LAYOUT */
#mapPanel{display:flex;flex-direction:column;flex:1;min-width:0}
#legendPanel{
  width:220px;flex-shrink:0;
  border-left:1.5px solid #1a1208;
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  background:#fff;display:none; /* hidden on mobile by default */
  flex-direction:column;
}
@media(min-width:640px){
  #legendPanel{display:flex;}
  .vtoggle{display:none;} /* hide map/list toggle on desktop */
  #listPanel{display:none!important;} /* list integrated in legend */
}
.legend-header{
  padding:10px 14px 8px;border-bottom:1.5px solid #1a1208;
  font-size:10px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;color:#6b5a34;
  flex-shrink:0;
}
.legend-grp-title{
  font-size:9px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;
  padding:10px 14px 5px;color:#6b5a34;border-bottom:.5px solid rgba(26,18,8,.08);
}
.legend-row{
  display:flex;align-items:center;gap:8px;
  padding:7px 14px;border-bottom:.5px solid rgba(26,18,8,.06);
  cursor:pointer;transition:background .1s;-webkit-tap-highlight-color:transparent;
}
.legend-row:hover,.legend-row:active{background:#ede8da}
.legend-row.dim{opacity:.22;pointer-events:none}
.legend-num{
  font-size:10px;font-weight:900;color:#f06118;
  min-width:20px;line-height:1;flex-shrink:0;
}
.legend-dot-sm{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.legend-name{font-size:11px;font-weight:700;color:#1a1208;line-height:1.3;flex:1;min-width:0}

/* MAP PANEL */
#mapPanel{position:absolute;inset:0;display:flex;flex-direction:column}
.map-wrap{flex:1;position:relative;overflow:hidden;min-height:0;background:#f8f6f1;cursor:grab}
.map-wrap.panning{cursor:grabbing}
/* SVG lives inside a transform wrapper */
.map-inner{position:absolute;top:0;left:0;transform-origin:0 0;will-change:transform}
#themap{display:block;touch-action:none;user-select:none;-webkit-user-select:none}

/* Pins */
.kpin{cursor:pointer;-webkit-tap-highlight-color:transparent}
.kpin.dim{opacity:.12}
.kpin.hi circle.pulse{animation:pinpulse 0.6s ease-in-out infinite alternate}
@keyframes pinpulse{0%{r:13;stroke-width:2.5}100%{r:17;stroke-width:1.5}}
.kpin.hi .pin-ring{animation:ringpulse 0.6s ease-in-out infinite alternate}
@keyframes ringpulse{0%{r:20;opacity:0.45}100%{r:26;opacity:0.08}}

/* Zoom buttons */
.zctrls{position:absolute;bottom:14px;right:14px;display:flex;flex-direction:column;gap:8px;z-index:10}
.zcbtn{width:44px;height:44px;border-radius:50%;background:#fff;border:1.5px solid rgba(26,18,8,0.3);font-size:22px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;touch-action:manipulation;color:#1a1208;box-shadow:0 2px 12px rgba(0,0,0,.18);line-height:1;font-family:inherit;}
.zcbtn:active{background:#f8f6f1;transform:scale(0.95)}

/* Legend */
.map-leg{display:flex;gap:8px;padding:6px 14px;background:#fff;border-top:1px solid rgba(26,18,8,.1);overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.map-leg::-webkit-scrollbar{display:none}
.legitem{display:flex;align-items:center;gap:4px;white-space:nowrap;font-size:9px;font-weight:700;color:#6b5a34;letter-spacing:.04em;text-transform:uppercase;flex-shrink:0}
.legdot{width:8px;height:8px;border-radius:50%}

/* LIST */
#listPanel{position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;display:none;padding:10px 14px 100px;background:#f8f6f1}
.grptitle{font-size:10px;font-weight:900;letter-spacing:.12em;text-transform:uppercase;padding:14px 0 8px;border-bottom:1.5px solid #1a1208;margin-bottom:8px}
.vcard{display:flex;align-items:center;gap:12px;padding:13px 14px;border:1.5px solid #1a1208;border-radius:10px;background:#fff;margin-bottom:7px;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation;transition:background .1s}
.vcard:active{background:#ede8da}
.vcard.dim{opacity:.18;pointer-events:none}
.vnum{font-size:16px;font-weight:900;color:#f06118;min-width:28px;line-height:1}
.vinfo{flex:1;min-width:0}
.vname{font-size:14px;font-weight:800;text-transform:uppercase;letter-spacing:.02em;line-height:1.25}
.vsub{font-size:11px;color:#6b5a34;margin-top:2px;font-weight:500}
.vbadge{font-size:9px;font-weight:900;letter-spacing:.06em;text-transform:uppercase;padding:4px 9px;border-radius:8px;border:1.5px solid;white-space:nowrap;flex-shrink:0}
.varr{font-size:18px;color:#6b5a34;flex-shrink:0}
.vlocate{display:flex;align-items:center;gap:4px;padding:5px 9px;border-radius:8px;border:1.5px solid #1a1208;background:transparent;color:#1a1208;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;cursor:pointer;font-family:inherit;-webkit-tap-highlight-color:transparent;touch-action:manipulation;white-space:nowrap;flex-shrink:0;transition:all .15s}
.vlocate:active,.vlocate:hover{background:#1a1208;color:#fff}

/* EMPTY STATE */
.empty{padding:48px 20px;text-align:center;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#6b5a34;opacity:.6}

/* DRAWER */
.overlay{position:fixed;inset:0;background:rgba(26,18,8,.55);z-index:200;opacity:0;pointer-events:none;transition:opacity .25s}
.overlay.on{opacity:1;pointer-events:all}
.drawer{position:fixed;bottom:0;left:0;right:0;background:#fff;border-radius:16px 16px 0 0;border-top:1.5px solid #1a1208;z-index:201;max-height:84vh;overflow-y:auto;overscroll-behavior:contain;transform:translateY(110%);transition:transform .3s cubic-bezier(.32,.72,0,1);padding-bottom:env(safe-area-inset-bottom,16px);-webkit-overflow-scrolling:touch}
.drawer.on{transform:translateY(0)}
.dpull{display:flex;justify-content:center;padding:12px 0 6px;cursor:pointer;position:sticky;top:0;background:#fff;z-index:1;border-bottom:.5px solid rgba(26,18,8,.1)}
.dpill{width:36px;height:4px;border-radius:2px;background:rgba(26,18,8,.18)}
.dhead{padding:16px 18px 12px;border-bottom:1px solid rgba(26,18,8,.1)}
.dbadge{display:inline-block;font-size:9px;font-weight:900;letter-spacing:.08em;text-transform:uppercase;padding:3px 10px;border-radius:10px;border:1.5px solid;margin-bottom:10px}
.dtop{display:flex;align-items:baseline;gap:10px;margin-bottom:6px}
.dnum{font-size:30px;font-weight:900;color:#f06118;line-height:1}
.dname{font-size:clamp(17px,5vw,23px);font-weight:900;text-transform:uppercase;letter-spacing:.02em;line-height:1.15}
.dlieu{font-size:12px;color:#6b5a34;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-top:4px}
.dbody{padding:16px 18px 8px}
.ddesc{font-size:15px;line-height:1.7;color:#1a1208}
.dtags{display:flex;gap:6px;flex-wrap:wrap;margin-top:14px}
.dtag{font-size:10px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:4px 11px;border-radius:12px;border:1.5px solid rgba(26,18,8,.12);color:#6b5a34}
.dlocate{display:flex;align-items:center;gap:8px;margin:14px 0 0;padding:13px 14px;border:1.5px solid #1a1208;border-radius:10px;background:#f8f6f1;font-size:12px;font-weight:700;color:#1a1208;cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.dclose{display:block;width:100%;margin:12px 0 0;padding:17px;background:#1a1208;color:#fff;font-size:13px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;border:none;border-radius:10px;cursor:pointer;font-family:inherit;touch-action:manipulation}

@media(min-width:600px){
  .drawer{max-width:520px;left:50%;right:auto;transform:translateX(-50%) translateY(110%)}
  .drawer.on{transform:translateX(-50%) translateY(0)}
  #listPanel{padding:12px 24px 100px}
  .vbtn{padding:7px 13px;font-size:11px}

}
</style>
</head>
<body>

<div class="ticker">

<div class="hdr">

// ── SVG HELPERS ──
const NS='http://www.w3.org/2000/svg';
function el(tag,attrs){
  const e=document.createElementNS(NS,tag);
  for(const[k,v2] of Object.entries(attrs)) e.setAttribute(k,v2);
  return e;
}
function rr(x,y,w,h,r,fill,stroke,sw=2){
  const p=el('rect',{x,y,width:w,height:h,rx:r});
  if(fill) p.setAttribute('fill',fill);
  if(stroke){p.setAttribute('stroke',stroke);p.setAttribute('stroke-width',sw);}
  return p;
}
function svgTxt(content,x,y,attrs){
  const t=el('text',{x,y,...attrs});
  t.textContent=content;
  return t;
}

// ── ZOOM ──
// ── GOOGLE MAPS STYLE PAN/ZOOM ──
let panX=0, panY=0, panScale=1;
const MIN_SCALE=0.5, MAX_SCALE=6;

function applyTransform(smooth){
  const inner=document.getElementById('mapInner');
  if(!inner) return;
  inner.style.transition=smooth?'transform 0.25s ease':'none';
  inner.style.transform=`translate(${panX}px,${panY}px) scale(${panScale})`;
}

function centerMap(){
  const wrap=document.getElementById('mapWrap');
  if(!wrap) return;
  const ww=wrap.clientWidth, wh=wrap.clientHeight;
  const mw=TOM_VW, mh=TOM_VH;
  panScale=Math.min((ww/mw)*0.9,(wh/mh)*0.9, 1);
  panX=(ww-mw*panScale)/2;
  panY=(wh-mh*panScale)/2;
  applyTransform(false);
  svgScale=panScale;
}

function zoom(f){
  const wrap=document.getElementById('mapWrap');
  const ww=wrap.clientWidth, wh=wrap.clientHeight;
  const cx=ww/2, cy=wh/2;
  const newScale=Math.min(MAX_SCALE,Math.max(MIN_SCALE,panScale*f));
  // Zoom toward center
  panX=cx-(cx-panX)*(newScale/panScale);
  panY=cy-(cy-panY)*(newScale/panScale);
  panScale=newScale;
  svgScale=panScale;
  applyTransform(true);
}

function resetZoom(){
  centerMap();
  applyTransform(true);
}

// ── MOUSE PAN ──
(function(){
  const wrap=document.getElementById('mapWrap');
  let dragging=false, startX, startY, startPanX, startPanY, didMove=false;
  wrap.addEventListener('mousedown',e=>{
    if(e.button!==0) return;
    dragging=true; didMove=false;
    startX=e.clientX; startY=e.clientY;
    startPanX=panX; startPanY=panY;
    wrap.classList.add('panning');
    e.preventDefault();
  });
  window.addEventListener('mousemove',e=>{
    if(!dragging) return;
    const dx=e.clientX-startX, dy=e.clientY-startY;
    if(Math.abs(dx)+Math.abs(dy)>4) didMove=true;
    panX=startPanX+dx; panY=startPanY+dy;
    applyTransform(false);
  });
  window.addEventListener('mouseup',e=>{
    wrap.classList.remove('panning');
    dragging=false;
  });

  // Mouse wheel zoom
  wrap.addEventListener('wheel',e=>{
    e.preventDefault();
    const rect=wrap.getBoundingClientRect();
    const mx=e.clientX-rect.left, my=e.clientY-rect.top;
    const f=e.deltaY<0?1.12:0.9;
    const newScale=Math.min(MAX_SCALE,Math.max(MIN_SCALE,panScale*f));
    panX=mx-(mx-panX)*(newScale/panScale);
    panY=my-(my-panY)*(newScale/panScale);
    panScale=newScale;
    svgScale=panScale;
    applyTransform(false);
  },{passive:false});
})();

// ── TOUCH PAN + PINCH ZOOM ──
(function(){
  const wrap=document.getElementById('mapWrap');
  let t1=null,t2=null, startPanX,startPanY, startDist,startScale, midX,midY;
  let didMove=false;

  wrap.addEventListener('touchstart',e=>{
    e.preventDefault();
    if(e.touches.length===1){
      t1=e.touches[0]; t2=null;
      startPanX=panX; startPanY=panY;
      didMove=false;
    } else if(e.touches.length===2){
      t1=e.touches[0]; t2=e.touches[1];
      startDist=Math.hypot(t2.clientX-t1.clientX,t2.clientY-t1.clientY);
      startScale=panScale;
      const rect=wrap.getBoundingClientRect();
      midX=(t1.clientX+t2.clientX)/2-rect.left;
      midY=(t1.clientY+t2.clientY)/2-rect.top;
      startPanX=panX; startPanY=panY;
      didMove=true;
    }
  },{passive:false});

  wrap.addEventListener('touchmove',e=>{
    e.preventDefault();
    if(e.touches.length===1 && !t2){
      const t=e.touches[0];
      const dx=t.clientX-t1.clientX, dy=t.clientY-t1.clientY;
      if(Math.abs(dx)+Math.abs(dy)>4) didMove=true;
      panX=startPanX+dx; panY=startPanY+dy;
      applyTransform(false);
    } else if(e.touches.length===2){
      const ta=e.touches[0], tb=e.touches[1];
      const dist=Math.hypot(tb.clientX-ta.clientX,tb.clientY-ta.clientY);
      const newScale=Math.min(MAX_SCALE,Math.max(MIN_SCALE,startScale*dist/startDist));
      panX=midX-(midX-startPanX)*(newScale/startScale);
      panY=midY-(midY-startPanY)*(newScale/startScale);
      panScale=newScale;
      svgScale=panScale;
      applyTransform(false);
    }
  },{passive:false});

  wrap.addEventListener('touchend',e=>{
    if(e.touches.length===0 && !didMove && t1 && !t2){
      // Tap — check hit
      const rect=wrap.getBoundingClientRect();
      const sx=(t1.clientX-rect.left-panX)/panScale;
      const sy=(t1.clientY-rect.top-panY)/panScale;
      const hit=V.find(v=>{const dx=sx-v.x,dy=sy-v.y;return Math.sqrt(dx*dx+dy*dy)<22;});
      if(hit) openDrawer(hit.id);
    }
    if(e.touches.length<2){t2=null;}
    if(e.touches.length===0){t1=null;}
  },{passive:true});
})();

// Pinch-to-zoom on scroll container
let pinch0=null, scale0=1;
const mw=document.getElementById('mapWrap');
mw.addEventListener('touchstart',e=>{
  if(e.touches.length===2){
    pinch0=Math.hypot(e.touches[1].clientX-e.touches[0].clientX,e.touches[1].clientY-e.touches[0].clientY);
    scale0=svgScale;
  }
},{passive:true});
mw.addEventListener('touchmove',e=>{
  if(e.touches.length===2&&pinch0){
    e.preventDefault();
    const d=Math.hypot(e.touches[1].clientX-e.touches[0].clientX,e.touches[1].clientY-e.touches[0].clientY);
    svgScale=Math.min(5,Math.max(0.4,scale0*d/pinch0));
    const svg=document.getElementById('themap');
    const vw=TOM_VW;
    const vh=TOM_VH;
    svg.setAttribute('width',vw*svgScale);
    svg.setAttribute('height',TOM_VH*svgScale);
    mw.style.alignItems='flex-start';
    mw.style.justifyContent='flex-start';
  }
},{passive:false});
mw.addEventListener('touchend',e=>{if(e.touches.length<2)pinch0=null;},{passive:true});

// ── LOCATION (single venue) ──
function setLoc(loc){ curLoc='tom'; buildMap(); }

// ── FILTER ──
function setFilter(cat){
  curFilter=cat;
  document.querySelectorAll('.fbtn').forEach(b=>{
    const bc=b.dataset.cat||'all';
    b.className='fbtn';
    if(bc===cat) b.classList.add('act-'+cat);
  });
  buildPins(); renderList(); renderLegend();
  requestAnimationFrame(centerMap);
}

// ── VIEW ──
function showView(v){
  curView=v;
  document.getElementById('mapPanel').style.display=v==='map'?'flex':'none';
  document.getElementById('listPanel').style.display=v==='list'?'block':'none';
  document.getElementById('btnMap').classList.toggle('on',v==='map');
  document.getElementById('btnList').classList.toggle('on',v==='list');
}

// ── LIST ──
function renderList(){
  const panel=document.getElementById('listPanel');
  const cats=curFilter==='all'?Object.keys(CATS):[curFilter];
  let html='';
  cats.forEach(cat=>{
    const items=V.filter(v=>v.loc===curLoc&&v.cat===cat);
    if(!items.length)return;
    const c=CATS[cat];
    html+=`<div class="grptitle" style="color:${c.text}">${c.label} (${items.length})</div>`;
    items.forEach(v=>{
      html+=`<div class="vcard" onclick="openDrawer(${v.id})">
        <div class="vnum">${v.id}</div>
        <div class="vinfo"><div class="vname">${v.name}</div><div class="vsub">📍 ${'Time Out Market'}</div></div>
        <button class="vlocate" onclick="event.stopPropagation();locatePin(${v.id})" title="Voir sur la carte">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="10" r="3"/><path d="M12 2a8 8 0 0 1 8 8c0 5.25-8 13-8 13S4 15.25 4 10a8 8 0 0 1 8-8z"/></svg>
          Carte
        </button>
        <div class="varr">›</div>
      </div>`;
    });
  });
  if(!html) html=`<div class="empty">Aucun marchand pour cette sélection</div>`;
  panel.innerHTML=html;
}

// ── LEGEND (desktop sidebar) ──
function renderLegend(){
  const panel=document.getElementById('legendContent');
  if(!panel) return;
  const cats=curFilter==='all'?Object.keys(CATS):[curFilter];
  let html='';
  cats.forEach(cat=>{
    const items=V.filter(v=>v.cat===cat);
    if(!items.length) return;
    const cd=CATS[cat];
    html+=`<div class="legend-grp-title" style="color:${cd.text}">${cd.label}</div>`;
    items.forEach(v=>{
      html+=`<div class="legend-row" onclick="legendClick(${v.id})">
        <div class="legend-num">${v.id}</div>
        <div class="legend-dot-sm" style="background:${cd.text}"></div>
        <div class="legend-name">${v.name}</div>
      </div>`;
    });
  });
  panel.innerHTML=html;
}

function legendClick(id){
  locatePin(id);
  setTimeout(()=>openDrawer(id),450);
}

// ── DRAWER ──
function openDrawer(id){
  const v=V.find(x=>x.id===id); if(!v) return;
  const c=CATS[v.cat];
  document.getElementById('dhead').innerHTML=`
    <div class="dbadge" style="background:${c.bg};color:${c.text};border-color:${c.bd}">${c.label}</div>
    <div class="dtop"><span class="dnum">${v.id}</span><span class="dname">${v.name}</span></div>
    <div class="dlieu">📍 ${'Time Out Market'}</div>`;
  const tags=(v.tags||[]).map(t=>`<span class="dtag">${t}</span>`).join('');
  document.getElementById('dbody').innerHTML=`
    <p class="ddesc">${v.desc}</p>
    ${tags?`<div class="dtags">${tags}</div>`:''}
    <div class="dlocate" onclick="locatePin(${v.id})">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="10" r="3"/><path d="M12 2a8 8 0 0 1 8 8c0 5.25-8 13-8 13S4 15.25 4 10a8 8 0 0 1 8-8z"/></svg>
      Voir sur la carte
    </div>
    <button class="dclose" onclick="closeDrawer()">Fermer</button>`;
  document.getElementById('drawer').scrollTop=0;
  requestAnimationFrame(()=>{
    document.getElementById('overlay').classList.add('on');
    document.getElementById('drawer').classList.add('on');
    document.body.style.overflow='hidden';
  });
}
function closeDrawer(){
  document.getElementById('overlay').classList.remove('on');
  document.getElementById('drawer').classList.remove('on');
  document.body.style.overflow='';
}
function locatePin(id){
  closeDrawer();
  const v=V.find(x=>x.id===id); if(!v) return;
  // Switch location tab if needed
  // Only TOM — no location switching needed
  // Switch to map view
  showView('map');
  // Highlight — inverted colors + pulsing animation
  highlighted=id;
  buildPins();
  // Scroll to center the pin
  setTimeout(()=>{
    // Pan map so vendor is centered using transform
    const wrap=document.getElementById('mapWrap');
    const ww=wrap.clientWidth, wh=wrap.clientHeight;
    // Keep current scale, just re-center on the pin
    panX=ww/2 - v.x*panScale;
    panY=wh/2 - v.y*panScale;
    applyTransform(true);
    // Stop pulsing after 3s
    setTimeout(()=>{ highlighted=null; buildPins(); },3000);
  },400);
}

document.getElementById('drawer').addEventListener('touchstart',e=>{dtouchY=e.touches[0].clientY;},{passive:true});
document.getElementById('drawer').addEventListener('touchmove',e=>{if(e.touches[0].clientY-dtouchY>70&&document.getElementById('drawer').scrollTop<=0)closeDrawer();},{passive:true});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeDrawer();});

window.addEventListener('resize',()=>{ buildMap(); });
window.addEventListener('orientationchange',()=>setTimeout(buildMap,200));

buildMap();
</script>
