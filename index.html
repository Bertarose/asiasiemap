<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<title>Carte — Festival Asiasie 2026</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%; overflow: hidden;
  font-family: 'Figtree', -apple-system, sans-serif;
  background: #f8f6f1; color: #1a1208;
  -webkit-text-size-adjust: 100%;
}

/* ── LAYOUT ── */
.app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }

/* TICKER */
.ticker { background: #f06118; color: #fff; font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; padding: 8px 0; white-space: nowrap; overflow: hidden; flex-shrink: 0; }
.ticker-inner { display: inline-block; animation: tick 26s linear infinite; }
.ticker-inner span { margin: 0 22px; }
@keyframes tick { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }

/* HEADER */
.header { padding: 11px 16px; display: flex; align-items: center; gap: 10px; border-bottom: 1.5px solid #1a1208; background: #fff; flex-shrink: 0; }
.logo { height: 26px; width: auto; flex-shrink: 0; }
.logo path, .logo rect, .logo polygon { fill: #1a1208; }
.header-title { font-size: 11px; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; color: #6b5a34; flex: 1; }
.view-toggle { display: flex; border: 1.5px solid #1a1208; border-radius: 8px; overflow: hidden; flex-shrink: 0; }
.view-btn { padding: 7px 13px; background: transparent; border: none; font-size: 11px; font-weight: 800; letter-spacing: 0.06em; text-transform: uppercase; color: #6b5a34; cursor: pointer; font-family: 'Figtree', sans-serif; -webkit-tap-highlight-color: transparent; transition: all 0.12s; touch-action: manipulation; }
.view-btn + .view-btn { border-left: 1px solid #1a1208; }
.view-btn.active { background: #1a1208; color: #fff; }

/* FILTERS */
.filters { display: flex; gap: 6px; padding: 10px 14px; overflow-x: auto; border-bottom: 1px solid rgba(26,18,8,0.1); background: #fff; flex-shrink: 0; scrollbar-width: none; }
.filters::-webkit-scrollbar { display: none; }
.f-btn { display: flex; align-items: center; gap: 5px; padding: 7px 12px; border-radius: 20px; border: 1.5px solid rgba(26,18,8,0.15); background: transparent; color: #6b5a34; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; cursor: pointer; white-space: nowrap; font-family: 'Figtree', sans-serif; -webkit-tap-highlight-color: transparent; touch-action: manipulation; transition: all 0.15s; flex-shrink: 0; }
.f-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* filter active states */
.f-btn.f-all.on   { background: #1a1208; border-color: #1a1208; color: #fff; }
.f-btn.f-bouffe.on { background: #f5d9c0; border-color: #e8a87a; color: #7a3d10; font-weight: 800; }
.f-btn.f-art.on    { background: #d6e8d0; border-color: #a8cc9e; color: #2d5e25; font-weight: 800; }
.f-btn.f-mode.on   { background: #f5cdd4; border-color: #e8939f; color: #7a2535; font-weight: 800; }
.f-btn.f-bien.on   { background: #c8d8ed; border-color: #8aacd4; color: #1e3d6b; font-weight: 800; }
.f-btn.f-activ.on  { background: #e8e0f0; border-color: #b89cd4; color: #4a2080; font-weight: 800; }

/* CONTENT */
.content { flex: 1; position: relative; overflow: hidden; min-height: 0; }

/* ── MAP ── */
#mapPanel { position: absolute; inset: 0; display: flex; flex-direction: column; }
.map-wrap { flex: 1; overflow: hidden; position: relative; min-height: 0; background: #f0ede5; }
#mapCanvas { width: 100%; height: 100%; touch-action: none; cursor: grab; display: block; }
#mapCanvas:active { cursor: grabbing; }
.map-hint { position: absolute; bottom: 52px; left: 50%; transform: translateX(-50%); background: rgba(26,18,8,0.75); color: #fff; font-size: 10px; font-weight: 700; padding: 5px 12px; border-radius: 20px; white-space: nowrap; letter-spacing: 0.05em; pointer-events: none; opacity: 1; transition: opacity 1s; }
.map-hint.hide { opacity: 0; }

/* Map legend */
.map-legend { display: flex; gap: 10px; padding: 8px 14px; background: #fff; border-top: 1px solid rgba(26,18,8,0.1); overflow-x: auto; scrollbar-width: none; flex-shrink: 0; }
.map-legend::-webkit-scrollbar { display: none; }
.leg-item { display: flex; align-items: center; gap: 5px; white-space: nowrap; font-size: 10px; font-weight: 700; color: #6b5a34; letter-spacing: 0.04em; text-transform: uppercase; flex-shrink: 0; }
.leg-dot { width: 10px; height: 10px; border-radius: 50%; }

/* ── LIST ── */
#listPanel { position: absolute; inset: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; display: none; padding: 10px 14px 100px; }
.grp-title { font-size: 10px; font-weight: 900; letter-spacing: 0.12em; text-transform: uppercase; padding: 14px 0 8px; border-bottom: 1.5px solid #1a1208; margin-bottom: 8px; }
.vendor-card { display: flex; align-items: center; gap: 12px; padding: 13px 14px; border: 1.5px solid #1a1208; border-radius: 10px; background: #fff; margin-bottom: 7px; cursor: pointer; -webkit-tap-highlight-color: transparent; touch-action: manipulation; transition: background 0.1s; }
.vendor-card:active { background: #ede8da; }
.vendor-card.faded { opacity: 0.18; pointer-events: none; }
.v-num { font-size: 16px; font-weight: 900; color: #f06118; min-width: 28px; line-height: 1; }
.v-info { flex: 1; min-width: 0; }
.v-name { font-size: 14px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.02em; line-height: 1.25; }
.v-sub { font-size: 11px; color: #6b5a34; margin-top: 2px; font-weight: 500; }
.v-badge { font-size: 9px; font-weight: 900; letter-spacing: 0.06em; text-transform: uppercase; padding: 4px 9px; border-radius: 8px; border: 1.5px solid; white-space: nowrap; flex-shrink: 0; }
.v-arr { font-size: 18px; color: #6b5a34; flex-shrink: 0; }

/* ── DRAWER ── */
.overlay { position: fixed; inset: 0; background: rgba(26,18,8,0.55); z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.25s; }
.overlay.on { opacity: 1; pointer-events: all; }
.drawer { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-radius: 16px 16px 0 0; border-top: 1.5px solid #1a1208; z-index: 201; max-height: 82vh; overflow-y: auto; overscroll-behavior: contain; transform: translateY(110%); transition: transform 0.3s cubic-bezier(0.32,0.72,0,1); padding-bottom: env(safe-area-inset-bottom, 16px); -webkit-overflow-scrolling: touch; }
.drawer.on { transform: translateY(0); }
.drawer-pull { display: flex; justify-content: center; padding: 12px 0 6px; cursor: pointer; position: sticky; top: 0; background: #fff; z-index: 1; border-bottom: 0.5px solid rgba(26,18,8,0.1); }
.drawer-pill { width: 36px; height: 4px; border-radius: 2px; background: rgba(26,18,8,0.18); }
.drawer-head { padding: 16px 18px 12px; border-bottom: 1px solid rgba(26,18,8,0.1); }
.d-badge { display: inline-block; font-size: 9px; font-weight: 900; letter-spacing: 0.08em; text-transform: uppercase; padding: 3px 10px; border-radius: 10px; border: 1.5px solid; margin-bottom: 10px; }
.d-top { display: flex; align-items: baseline; gap: 10px; margin-bottom: 6px; }
.d-num { font-size: 30px; font-weight: 900; color: #f06118; line-height: 1; }
.d-name { font-size: clamp(17px,5vw,23px); font-weight: 900; text-transform: uppercase; letter-spacing: 0.02em; line-height: 1.15; }
.d-lieu { font-size: 12px; color: #6b5a34; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
.drawer-body { padding: 16px 18px 8px; }
.d-desc { font-size: 15px; line-height: 1.7; color: #1a1208; }
.d-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 14px; }
.d-tag { font-size: 10px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; padding: 4px 11px; border-radius: 12px; border: 1.5px solid rgba(26,18,8,0.12); color: #6b5a34; }
.d-locate { display: flex; align-items: center; gap: 8px; margin: 14px 0 0; padding: 13px 14px; border: 1.5px solid #1a1208; border-radius: 10px; background: #f8f6f1; font-size: 12px; font-weight: 700; color: #1a1208; cursor: pointer; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
.d-close { display: block; width: 100%; margin: 12px 0 0; padding: 17px; background: #1a1208; color: #fff; font-size: 13px; font-weight: 900; letter-spacing: 0.1em; text-transform: uppercase; border: none; border-radius: 10px; cursor: pointer; font-family: 'Figtree', sans-serif; touch-action: manipulation; }

@media (min-width: 600px) {
  .drawer { max-width: 520px; left: 50%; right: auto; transform: translateX(-50%) translateY(110%); }
  .drawer.on { transform: translateX(-50%) translateY(0); }
  #listPanel { padding: 12px 24px 100px; }
}
</style>
</head>

// Layout mode
function isMobile() { return window.innerWidth < 600; }

// Virtual canvas dimensions change based on layout
// Desktop: W=900, H=560 (side by side)
// Mobile:  W=460, H=1000 (stacked)
function getVirtualDims() {
  return isMobile()
    ? { vw: 460, vh: 1020 }
    : { vw: 900, vh: 560 };
}

function resize() {
  const wrap = canvas.parentElement;
  const cw = wrap.clientWidth;
  const ch = wrap.clientHeight;
  canvas.width  = cw * devicePixelRatio;
  canvas.height = ch * devicePixelRatio;
  canvas.style.width  = cw + 'px';
  canvas.style.height = ch + 'px';
  const { vw, vh } = getVirtualDims();
  const scaleX = cw / vw;
  const scaleY = ch / vh;
  camZ = Math.min(scaleX, scaleY) * 0.92;
  camX = (cw - vw * camZ) / 2;
  camY = isMobile() ? 10 : (ch - vh * camZ) / 2;
  drawMap();
}

function drawMap() {
  const w = canvas.width / devicePixelRatio;
  const h = canvas.height / devicePixelRatio;
  ctx.save();
  ctx.scale(devicePixelRatio, devicePixelRatio);
  ctx.clearRect(0, 0, w, h);
  ctx.fillStyle = '#f0ede5';
  ctx.fillRect(0, 0, w, h);
  ctx.save();
  ctx.translate(camX, camY);
  ctx.scale(camZ, camZ);
  if (isMobile()) {
    drawFloorPlanMobile();
  } else {
    drawFloorPlan();
  }
  drawVendors();
  ctx.restore();
  ctx.restore();
}

function drawRoundRect(x, y, w, h, r, fill, stroke, sw=1.5) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y); ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r); ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h); ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r); ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
  if (fill) { ctx.fillStyle = fill; ctx.fill(); }
  if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = sw; ctx.stroke(); }
}

function drawVendors() {
  const mobile = isMobile();
  V.forEach(v => {
    const c = CATS[v.cat];
    const active = (filter === 'all' || filter === v.cat);
    const isHigh = (highlighted === v.id);
    const vx = mobile ? v.mx : v.x;
    const vy = mobile ? v.my : v.y;
    if (!vx || !vy) return;

    ctx.globalAlpha = active ? 1 : 0.12;
    const r = isHigh ? 18 : 15;

    if (isHigh) { ctx.shadowColor = c.text; ctx.shadowBlur = 14; }

    ctx.beginPath();
    ctx.arc(vx, vy, r, 0, Math.PI*2);
    ctx.fillStyle = c.bg;
    ctx.fill();
    ctx.strokeStyle = c.text;
    ctx.lineWidth = isHigh ? 2.5 : 2;
    ctx.stroke();
    ctx.shadowBlur = 0;

    ctx.fillStyle = c.text;
    ctx.font = `bold ${isHigh?11:10}px Figtree,sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(v.id, vx, vy);
    ctx.textBaseline = 'alphabetic';
    ctx.globalAlpha = 1;
  });
}

// Hit test
function hitTest(screenX, screenY) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / devicePixelRatio / rect.width;
  const scaleY = canvas.height / devicePixelRatio / rect.height;
  const cx = (screenX - rect.left) * scaleX;
  const cy = (screenY - rect.top) * scaleY;
  const wx = (cx - camX) / camZ;
  const wy = (cy - camY) / camZ;
  const mobile = isMobile();
  return V.find(v => {
    const vx = mobile ? v.mx : v.x;
    const vy = mobile ? v.my : v.y;
    const dx = wx - vx, dy = wy - vy;
    return Math.sqrt(dx*dx+dy*dy) < 20;
  });
}

// Mouse events
canvas.addEventListener('mousedown', e => {
  isDragging = true; didDrag = false;
  dragStartX = e.clientX; dragStartY = e.clientY;
  camStartX = camX; camStartY = camY;
});
window.addEventListener('mouseup', e => {
  if (!didDrag) {
    const hit = hitTest(e.clientX, e.clientY);
    if (hit) openDrawer(hit.id);
  }
  isDragging = false;
});
window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  const dx = e.clientX - dragStartX, dy = e.clientY - dragStartY;
  if (Math.abs(dx)+Math.abs(dy) > 4) didDrag = true;
  camX = camStartX + dx; camY = camStartY + dy;
  drawMap();
});
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) / rect.width * canvas.width/devicePixelRatio;
  const my = (e.clientY - rect.top) / rect.height * canvas.height/devicePixelRatio;
  const factor = e.deltaY < 0 ? 1.1 : 0.92;
  const nz = Math.min(5, Math.max(0.4, camZ * factor));
  camX = mx - (mx - camX) * (nz/camZ);
  camY = my - (my - camY) * (nz/camZ);
  camZ = nz;
  drawMap();
}, {passive:false});

// Touch events
let touch1 = null, touch2 = null, tcamX, tcamY, tcamZ;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  didDrag = false;
  if (e.touches.length === 1) {
    touch1 = e.touches[0]; touch2 = null;
    dragStartX = touch1.clientX; dragStartY = touch1.clientY;
    camStartX = camX; camStartY = camY;
  } else if (e.touches.length === 2) {
    touch1 = e.touches[0]; touch2 = e.touches[1];
    lastPinchDist = Math.hypot(touch2.clientX-touch1.clientX, touch2.clientY-touch1.clientY);
    tcamX = camX; tcamY = camY; tcamZ = camZ;
    didDrag = true;
  }
}, {passive:false});

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (e.touches.length === 1 && !touch2) {
    const t = e.touches[0];
    const dx = t.clientX - dragStartX, dy = t.clientY - dragStartY;
    if (Math.abs(dx)+Math.abs(dy) > 5) didDrag = true;
    camX = camStartX + dx; camY = camStartY + dy;
    drawMap();
  } else if (e.touches.length === 2) {
    const t1 = e.touches[0], t2 = e.touches[1];
    const dist = Math.hypot(t2.clientX-t1.clientX, t2.clientY-t1.clientY);
    const factor = dist / lastPinchDist;
    const nz = Math.min(5, Math.max(0.4, tcamZ * factor));
    const mx = (t1.clientX+t2.clientX)/2;
    const my = (t1.clientY+t2.clientY)/2;
    const rect = canvas.getBoundingClientRect();
    const px = (mx-rect.left)/rect.width * canvas.width/devicePixelRatio;
    const py = (my-rect.top)/rect.height * canvas.height/devicePixelRatio;
    camX = px - (px - tcamX) * (nz/tcamZ);
    camY = py - (py - tcamY) * (nz/tcamZ);
    camZ = nz;
    drawMap();
  }
}, {passive:false});

canvas.addEventListener('touchend', e => {
  if (!didDrag && e.changedTouches.length === 1) {
    const t = e.changedTouches[0];
    const hit = hitTest(t.clientX, t.clientY);
    if (hit) openDrawer(hit.id);
  }
  if (e.touches.length < 2) { touch2 = null; lastPinchDist = null; }
  if (e.touches.length === 0) { touch1 = null; }
}, {passive:true});

function renderList() {
  const panel = document.getElementById('listPanel');
  const cats = filter === 'all' ? Object.keys(CATS) : [filter];
  let html = '';
  cats.forEach(cat => {
    const items = V.filter(v => v.cat === cat);
    if (!items.length) return;
    const c = CATS[cat];
    html += `<div class="grp-title" style="color:${c.text}">${c.label} (${items.length})</div>`;
    items.forEach(v => {
      html += `<div class="vendor-card" onclick="openDrawer(${v.id})">
        <div class="v-num">${v.id}</div>
        <div class="v-info">
          <div class="v-name">${v.name}</div>
          <div class="v-sub">📍 ${v.lieu}</div>
        </div>
        <span class="v-badge" style="background:${c.bg};color:${c.text};border-color:${c.bd}">${c.label}</span>
        <div class="v-arr">›</div>
      </div>`;
    });
  });
  panel.innerHTML = html;
}

      <span class="d-name">${v.name}</span>

    <div class="d-lieu">📍 ${v.lieu}</div>

  const tags = (v.tags||[]).map(t=>`<span class="d-tag">${t}</span>`).join('');
  document.getElementById('drawerBody').innerHTML = `
    <p class="d-desc">${v.desc}</p>
    ${tags ? `<div class="d-tags">${tags}</div>` : ''}
    <div class="d-locate" onclick="locatePin(${v.id})">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#1a1208" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="10" r="3"/><path d="M12 2a8 8 0 0 1 8 8c0 5.25-8 13-8 13S4 15.25 4 10a8 8 0 0 1 8-8z"/></svg>
      Voir sur la carte
    </div>
    <button class="d-close" onclick="closeDrawer()">Fermer</button>
  `;
  document.getElementById('drawer').scrollTop = 0;
  requestAnimationFrame(() => {
    document.getElementById('overlay').classList.add('on');
    document.getElementById('drawer').classList.add('on');
    document.body.style.overflow = 'hidden';
  });
}

function closeDrawer() {
  document.getElementById('overlay').classList.remove('on');
  document.getElementById('drawer').classList.remove('on');
  document.body.style.overflow = '';
}

function locatePin(id) {
  closeDrawer();
  showView('map');
  setTimeout(() => {
    highlighted = id;
    drawMap();
    // Center on the vendor
    const v = V.find(x => x.id === id);
    if (v) {
      const w = canvas.width/devicePixelRatio, h = canvas.height/devicePixelRatio;
      const vx = isMobile() ? v.mx : v.x;
      const vy = isMobile() ? v.my : v.y;
      camX = w/2 - vx * camZ;
      camY = h/2 - vy * camZ;
      drawMap();
    }
    setTimeout(() => { highlighted = null; drawMap(); }, 3000);
  }, 350);
}

// Swipe to close drawer
document.getElementById('drawer').addEventListener('touchstart', e => {
  drawerTouchY = e.touches[0].clientY;
}, {passive:true});
document.getElementById('drawer').addEventListener('touchmove', e => {
  if (e.touches[0].clientY - drawerTouchY > 70 && document.getElementById('drawer').scrollTop <= 0) closeDrawer();
}, {passive:true});
document.addEventListener('keydown', e => { if (e.key==='Escape') closeDrawer(); });

// ──────────────────────────────────────
// FILTER & VIEW
// ──────────────────────────────────────
function setFilter(cat) {
  filter = cat;
  document.querySelectorAll('.f-btn').forEach(b => {
    b.className = b.className.replace(' on','');
    if (b.classList.contains('f-'+cat) || (cat==='all' && b.classList.contains('f-all'))) {
      b.classList.add('on');
    }
  });
  drawMap();
  renderList();
}

function showView(v) {
  view = v;
  document.getElementById('mapPanel').style.display = v==='map' ? 'flex' : 'none';
  document.getElementById('listPanel').style.display = v==='list' ? 'block' : 'none';
  document.getElementById('btnMap').classList.toggle('active', v==='map');
  document.getElementById('btnList').classList.toggle('active', v==='list');
  if (v==='map') { requestAnimationFrame(drawMap); }
}

// Mobile coordinates
const MOBILE_COORDS = {1: (70, 70), 2: (70, 154), 3: (70, 239), 4: (186, 70), 5: (186, 154), 6: (186, 239), 7: (302, 70), 8: (302, 154), 9: (400, 70), 10: (400, 154), 11: (302, 239), 12: (70, 352), 13: (186, 352), 14: (302, 352), 15: (400, 239), 16: (400, 352), 17: (70, 420), 18: (205, 420), 19: (70, 555), 20: (70, 639), 21: (70, 724), 22: (231, 555), 23: (231, 639), 24: (231, 724), 25: (400, 555), 26: (400, 639), 27: (70, 837), 28: (231, 837), 29: (400, 724), 30: (400, 837)};
V.forEach(v => { if (MOBILE_COORDS[v.id]) { v.mx = MOBILE_COORDS[v.id][0]; v.my = MOBILE_COORDS[v.id][1]; } });

// ──────────────────────────────────────
// INIT
// ──────────────────────────────────────
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', () => setTimeout(resize, 200));
resize();
renderList();

// Hide hint after 4s
setTimeout(() => {
  const h = document.getElementById('mapHint');
  if (h) h.classList.add('hide');
}, 4000);
</script>
</body>
</html>
